name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: []
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: services/api-gateway
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/edupilot/api-gateway:${{ github.sha }},${{ secrets.REGISTRY_URL }}/edupilot/api-gateway:latest

      - name: Build and push LMS Scraper
        uses: docker/build-push-action@v5
        with:
          context: services/lms-scraper
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/edupilot/lms-scraper:${{ github.sha }},${{ secrets.REGISTRY_URL }}/edupilot/lms-scraper:latest

      - name: Build and push AI Agent
        uses: docker/build-push-action@v5
        with:
          context: services/ai-agent
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/edupilot/ai-agent:${{ github.sha }},${{ secrets.REGISTRY_URL }}/edupilot/ai-agent:latest

      - name: Build and push Web App
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/edupilot/web:${{ github.sha }},${{ secrets.REGISTRY_URL }}/edupilot/web:latest

      # Rolling update — update each service individually with health check wait
      - name: Deploy API Gateway (rolling update)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/edupilot
            export IMAGE_TAG=${{ github.sha }}
            docker-compose pull api-gateway
            docker-compose up --no-deps --build -d api-gateway
            echo "Waiting for api-gateway health check..."
            sleep 15
            docker-compose exec -T api-gateway curl -f http://localhost:8080/health || exit 1

      - name: Deploy LMS Scraper (rolling update)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/edupilot
            docker-compose pull lms-scraper
            docker-compose up --no-deps --build -d lms-scraper
            sleep 10
            docker-compose exec -T lms-scraper curl -f http://localhost:8002/health || exit 1

      - name: Deploy Web App (rolling update)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/edupilot
            docker-compose pull web
            docker-compose up --no-deps --build -d web
            sleep 10
